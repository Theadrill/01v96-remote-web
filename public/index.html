<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>01V96 - LIVE SAFE</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- Splash Screen Overlay -->
    <div id="splashScreen" class="splash-overlay">
        <!-- Botão de Fullscreen para Splash -->
        <button id="fsBtnSplash" class="fs-btn" style="position:fixed; bottom:20px; right:20px; z-index:10001; width:44px; height:44px; border-radius:50%; background:rgba(85,85,85,0.8); border:1px solid #666; color:white; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="toggleFullScreen()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
        </button>
        <div class="splash-container">
            <div class="splash-logo">
                <h1 class="splash-title">01V96</h1>
                <p class="splash-subtitle">LIVE SAFE</p>
            </div>

            <!-- Initial Choice -->
            <div id="splashInitial" class="splash-step">
                <button class="splash-btn btn-tecnico" onclick="showSplashStep('tecnico')">TÉCNICO</button>
                <button class="splash-btn btn-musico" onclick="showSplashStep('musico')">MÚSICO</button>
            </div>

            <!-- Tecnico Password -->
            <div id="splashTecnico" class="splash-step" style="display: none;">
                <p class="splash-msg">ENTRADA TÉCNICO</p>
                <input type="password" id="tecnicoPass" class="splash-input" placeholder="••••" maxlength="4" inputmode="numeric">
                <div class="splash-actions">
                    <button class="splash-btn btn-back" onclick="showSplashStep('initial')">VOLTAR</button>
                    <button class="splash-btn btn-confirm" onclick="checkTecnicoPass()">ENTRAR</button>
                </div>
            </div>

            <!-- Musico Buttons -->
            <div id="splashMusico" class="splash-step" style="display: none;">
                <p class="splash-msg">SELECIONE SEU FONE</p>
                <div class="musico-grid">
                    <button class="splash-btn btn-fone" onclick="musicoAlert(1)">FONE 1</button>
                    <button class="splash-btn btn-fone" onclick="musicoAlert(2)">FONE 2</button>
                    <button class="splash-btn btn-fone" onclick="musicoAlert(3)">FONE 3</button>
                    <button class="splash-btn btn-fone" onclick="musicoAlert(4)">FONE 4</button>
                    <button class="splash-btn btn-fone" onclick="musicoAlert(5)">FONE 5</button>
                    <button class="splash-btn btn-fone" onclick="musicoAlert(6)">FONE 6</button>
                    <button class="splash-btn btn-fone" onclick="musicoAlert(7)">FONE 7</button>
                    <button class="splash-btn btn-fone" onclick="musicoAlert(8)">FONE 8</button>
                </div>
                <button class="splash-btn btn-back" onclick="showSplashStep('initial')" style="margin-top: 20px;">VOLTAR</button>
            </div>
        </div>
    </div>


    <div class="faders-area" id="faders-container"></div>

    <div class="sidebar">
        <div id="scn" class="color-green font-13-bold mb-20" style="text-align: center; width: 100%; letter-spacing: 1px;">01V96</div>
        
        <!-- Navegação Principal (Config/Sync) -->
        <div id="mainNav" style="display: flex; flex-direction: column; width: 100%; align-items: center;">
            <button class="side-btn btn-config" onclick="document.getElementById('configModal').style.display='flex'">CONFIG</button>
            <button class="side-btn btn-sync" onclick="forceSync()">SYNC</button> 
        </div>

        <!-- Navegação de Configuração do Canal (Abas) -->
        <div id="chNav" style="display: none; flex-direction: column; width: 100%; align-items: center;">
            <button class="side-btn btn-tab active-tab" onclick="switchTab('eq')">EQ</button>
            <button class="side-btn btn-tab" onclick="switchTab('dyn')">DYN</button>
            <button class="side-btn btn-tab" onclick="switchTab('aux')">AUXS</button>
        </div>

            <div id="sideFooter" style="margin-top: auto; width: 100%; display: flex; flex-direction: column; align-items: center;">
                <!-- Área de Contexto do Canal (Aparece ao abrir) -->
                <div id="chContext" style="display: none; flex-direction: column; width: 100%; align-items: center; border-top: 1px solid #444; padding-top: 10px; margin-bottom: 10px;">
                    <div id="chSideMode" style="color: #666; font-size: 10px; text-transform: uppercase; margin-bottom: 5px;">AUX SENDS</div>
                    <div style="display: flex; flex-direction: column; align-items: center; width: 100%; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 12px; gap: 8px;">
                        <div id="chSideTitle" class="ch-side-title" style="cursor: pointer; text-decoration: underline dotted #5cacee;" onclick="openNameEditor()">1 - CH 1</div>
                        <div style="display: flex; gap: 8px; width: 100%; justify-content: center;">
                            <button class="nav-btn" style="flex: 1; max-width: 44px; height: 38px; font-size: 20px;" onclick="changeConfigChannel(-1)">&lt;</button>
                            <button class="nav-btn" style="flex: 1; max-width: 44px; height: 38px; font-size: 20px;" onclick="changeConfigChannel(1)">&gt;</button>
                        </div>
                    </div>
                    <button class="side-btn btn-close-side" onclick="closeChannelConfig()">SAIR</button>
                </div>

                <!-- Botão de Sair do Músico (Apenas no modo Músico) -->
                <button id="musicianExitBtn" class="side-btn" style="display:none; width:100%; background:#dc3545; color:white;" onclick="clearRole(); location.reload();">DESCONECTAR</button>
                
                <!-- Botão de Logout do Técnico (No Rodapé) -->
                <button id="tecnicoExitBtn" class="side-btn" style="display:none; width:100%; background:#dc3545; color:white;" onclick="clearRole(); location.reload();">DESCONECTAR</button>

                <!-- Botão Fullscreen da Sidebar -->
                <button id="fsBtnSidebar" class="side-btn fs-icon-btn" style="width:100%; height:44px; margin-top:10px; background:#444;" onclick="toggleFullScreen()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                    </svg>
                </button>
            </div>
    </div>

    <div id="configModal" class="modal-overlay">
        <div class="modal-content">
            <select id="sin" class="modal-select"></select>
            <select id="sout" class="modal-select"></select>
            
            <div style="margin: 20px 0; border-top: 1px solid #444; padding-top: 20px;">
                <p style="font-size: 12px; color: #888; margin-bottom: 10px;">ORIENTAÇÃO</p>
                <div style="display: flex; gap: 10px;">
                    <button onclick="setOrientation('vertical')" class="btn-connect" style="background:#555;">VERTICAL</button>
                    <button onclick="setOrientation('horizontal')" class="btn-connect" style="background:#555;">HORIZONTAL</button>
                </div>
            </div>

            <div style="margin: 20px 0; border-top: 1px solid #444; padding-top: 20px; display: flex; flex-direction: column; gap: 25px; align-items: center;">
                <!-- Bloco Demo Centralizado -->
                <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                    <p style="font-size: 11px; color: #888; margin: 0; letter-spacing: 1px;">MODO DEMO</p>
                    <button id="demoBtn" onclick="toggleDemoMode()" class="btn-connect" style="width: 120px; padding: 15px 0; font-size: 13px; font-weight: bold; background: #28a745; border-radius: 8px;">DEMO ON</button>
                </div>
                
                <!-- Bloco Transparência Centralizado (50% de largura) -->
                <div style="display: flex; flex-direction: column; align-items: center; gap: 10px; width: 50%;">
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 2px;">
                        <p style="font-size: 11px; color: #888; margin: 0; letter-spacing: 1px;">TRANSPARÊNCIA METER</p>
                        <span id="opacityVal" style="font-size: 12px; color: #5cacee; font-weight: bold;">50%</span>
                    </div>
                    <input type="range" id="meterOpacity" min="10" max="100" value="50" style="width: 100%; -webkit-appearance: none; appearance: none; background: #444; height: 6px; border-radius: 3px; cursor: pointer;" oninput="updateMeterOpacity(this.value)">
                </div>
            </div>

            <div class="modal-actions">
                <button onclick="conn()" class="btn-connect">CONECTAR</button>
                <button onclick="document.getElementById('configModal').style.display='none'" class="btn-close">FECHAR</button>
            </div>
        </div>
    </div>

    <!-- Modal de Configuração de Canal (Sem Header para ganhar espaço) -->
    <div id="chConfigModal" class="ch-modal-overlay">
        <div class="ch-modal-body">
            Área Reservada...
        </div>
    </div>
    <!-- Modal de Confirmação Customizado para EQ -->
    <div id="customConfirmModal" class="modal-overlay" style="z-index:9999; display:none;">
        <div class="modal-content" style="max-width:400px; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.8); border:2px solid #333; background:#1a1a1a; padding:30px; border-radius:15px;">
            <h3 style="margin-top:0; color:#5cacee; font-size:16px; letter-spacing:1px; text-transform:uppercase;">Confirmação de Cópia</h3>
            <p id="customConfirmMsg" style="font-size:14px; color:#aaa; margin:20px 0 30px 0; line-height:1.5;">Deseja colar as definições para este canal?</p>
            <div style="display:flex; gap:15px;">
                <button id="customConfirmOk" style="flex:1; border-radius:10px; padding:15px; font-size:13px; background:#007bff; color:#fff; border:none; cursor:pointer;">SIM, COLAR</button>
                <button id="customConfirmCancel" style="flex:1; border-radius:10px; padding:15px; font-size:13px; background:#444; color:#fff; border:none; cursor:pointer;">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- Modal de Edição de Nome do Canal -->
    <div id="nameEditorModal" class="modal-overlay" style="z-index:10000; display:none;">
        <div class="modal-content" style="max-width:320px; text-align:center; background:#1a1a1a; border:1px solid #444; border-radius:12px; padding:25px;">
            <p style="font-size:10px; color:#666; text-transform:uppercase; margin-bottom:15px; letter-spacing:1px;">Editar Nome do Canal</p>
            <input type="text" id="inputChName" maxlength="5" style="width:100%; height:45px; background:#222; border:1px solid #444; color:#fff; text-align:center; font-size:22px; font-weight:bold; border-radius:8px; margin-bottom:20px; outline:none; text-transform:uppercase;">
            <div style="display:flex; gap:10px;">
                <button onclick="saveChannelName()" class="btn-connect" style="flex:1; margin:0; height:45px;">SALVAR</button>
                <button onclick="document.getElementById('nameEditorModal').style.display='none'" class="btn-close" style="flex:1; margin:0; height:45px;">CANCELAR</button>
            </div>
        </div>
    </div>

    <script src="modules/globals.js"></script>
    <script src="modules/channel_strip.js"></script>
    <script src="modules/eq.js"></script>
    <script src="modules/dynamics.js"></script>
    <script src="modules/auxs_sends.js"></script>
    <script src="modules/events.js"></script>
    <script src="modules/socket.js"></script>
    <script src="modules/sidebar.js"></script>
    <script src="modules/scroll.js"></script>
    <script src="modules/splash_screen.js"></script>
    <script src="app.js"></script>

</body>
</html>
