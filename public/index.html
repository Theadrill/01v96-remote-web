<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>01V96 - LIVE SAFE</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div class="faders-area" id="faders-container"></div>

    <div class="sidebar">
        <div id="scn" class="color-green font-13-bold mb-20">01V96</div>
        
        <!-- Navegação Principal (Config/Sync) -->
        <div id="mainNav" style="display: flex; flex-direction: column; width: 100%; align-items: center;">
            <button class="side-btn btn-config" onclick="document.getElementById('configModal').style.display='flex'">CONFIG</button>
            <button class="side-btn btn-sync" onclick="forceSync()">SYNC</button> 
        </div>

        <!-- Navegação de Configuração do Canal (Abas) -->
        <div id="chNav" style="display: none; flex-direction: column; width: 100%; align-items: center;">
            <button class="side-btn btn-tab active-tab" onclick="switchTab('eq')">EQ</button>
            <button class="side-btn btn-tab" onclick="switchTab('dyn')">DYN</button>
            <button class="side-btn btn-tab" onclick="switchTab('aux')">AUXS</button>
        </div>

        <div id="sideFooter" style="margin-top: auto; width: 100%; display: flex; flex-direction: column; align-items: center;">
            <!-- Área de Contexto do Canal (Aparece ao abrir) -->
            <div id="chContext" style="display: none; flex-direction: column; width: 100%; align-items: center; border-top: 1px solid #444; padding-top: 10px; margin-bottom: 10px;">
                <div id="eqQuickActions" style="display: none; flex-direction: column; width: 100%; gap: 10px; margin-bottom: 10px;">
                    <div class="show-mobile" style="display: flex; flex-wrap: wrap; width: 100%; gap: 6px; justify-content: space-between;">
                        <button id="sideBtnPhase" class="side-btn" style="flex: 1 1 48%; font-size: 10px; padding: 12px 0; margin-bottom: 0;" onclick="togglePhase(activeConfigChannel)">PHASE</button>
                        <button id="sideBtnFlat" class="side-btn" style="flex: 1 1 48%; font-size: 10px; padding: 12px 0; margin-bottom: 0; background:#dc3545; color:#fff;" onclick="flatEQ(activeConfigChannel)">FLAT</button>
                        
                        <button id="sideBtnCopy" class="side-btn" style="flex: 1 1 48%; font-size: 10px; padding: 12px 0; margin-bottom: 0; background:#007bff; color:#fff;" onclick="copyEQ(activeConfigChannel)">COPIAR</button>
                        <button id="sideBtnPaste" class="side-btn" style="flex: 1 1 48%; font-size: 10px; padding: 12px 0; margin-bottom: 0; background:#444; color:#fff; opacity:0.4;" disabled onclick="pasteEQ(activeConfigChannel)">COLAR</button>
                        
                        <button id="sideBtnEQOn" class="side-btn" style="flex: 1 1 100%; font-size: 10px; padding: 12px 0; margin-bottom: 0; color:#fff;" onclick="toggleEQ(activeConfigChannel)">EQ ON</button>
                    </div>
                    <div id="sideQNudge" class="show-mobile" style="display:flex; align-items:center; justify-content:center; gap:8px; background:#111; padding:5px; border-radius:8px; width:100%; box-sizing:border-box;">
                        <button class="nav-btn" style="width:36px; height:36px; font-size:22px;" onpointerdown="startQNudge(-1)" onpointerup="stopQNudge()" onpointerleave="stopQNudge()">-</button>
                        <span style="font-size:12px; color:#888; font-weight:bold;">Q</span>
                        <button class="nav-btn" style="width:36px; height:36px; font-size:20px;" onpointerdown="startQNudge(1)" onpointerup="stopQNudge()" onpointerleave="stopQNudge()">+</button>
                    </div>
                </div>
                <div id="chSideMode" style="color: #666; font-size: 10px; text-transform: uppercase; margin-bottom: 2px;">AUX SENDS</div>
                <div id="chSideName" class="color-green font-13-bold mb-10" style="text-align: center; word-break: break-all;">CH 1</div>
                <button class="side-btn btn-close-side" onclick="closeChannelConfig()">SAIR</button>
            </div>

            <button class="side-btn fs-btn fs-icon-btn" onclick="toggleFullScreen()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                </svg>
            </button>
        </div>
    </div>

    <div id="configModal" class="modal-overlay">
        <div class="modal-content">
            <select id="sin" class="modal-select"></select>
            <select id="sout" class="modal-select"></select>
            
            <div style="margin: 20px 0; border-top: 1px solid #444; padding-top: 20px;">
                <p style="font-size: 12px; color: #888; margin-bottom: 10px;">ORIENTAÇÃO</p>
                <div style="display: flex; gap: 10px;">
                    <button onclick="setOrientation('vertical')" class="btn-connect" style="background:#555;">VERTICAL</button>
                    <button onclick="setOrientation('horizontal')" class="btn-connect" style="background:#555;">HORIZONTAL</button>
                </div>
            </div>

            <div class="modal-actions">
                <button onclick="conn()" class="btn-connect">CONECTAR</button>
                <button onclick="document.getElementById('configModal').style.display='none'" class="btn-close">FECHAR</button>
            </div>
        </div>
    </div>

    <!-- Modal de Configuração de Canal (Sem Header para ganhar espaço) -->
    <div id="chConfigModal" class="ch-modal-overlay">
        <div class="ch-modal-body">
            Área Reservada...
        </div>
    </div>
    <!-- Modal de Confirmação Customizado para EQ -->
    <div id="customConfirmModal" class="modal-overlay" style="z-index:9999; display:none;">
        <div class="modal-content" style="max-width:400px; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.8); border:2px solid #333; background:#1a1a1a; padding:30px; border-radius:15px;">
            <h3 style="margin-top:0; color:#5cacee; font-size:16px; letter-spacing:1px; text-transform:uppercase;">Confirmação de Cópia</h3>
            <p id="customConfirmMsg" style="font-size:14px; color:#aaa; margin:20px 0 30px 0; line-height:1.5;">Deseja colar as definições para este canal?</p>
            <div style="display:flex; gap:15px;">
                <button id="customConfirmOk" style="flex:1; border-radius:10px; padding:15px; font-size:13px; background:#007bff; color:#fff; border:none; cursor:pointer;">SIM, COLAR</button>
                <button id="customConfirmCancel" style="flex:1; border-radius:10px; padding:15px; font-size:13px; background:#444; color:#fff; border:none; cursor:pointer;">CANCELAR</button>
            </div>
        </div>
    </div>

    <script src="modules/globals.js"></script>
    <script src="modules/channel_strip.js"></script>
    <script src="modules/eq.js"></script>
    <script src="modules/dynamics.js"></script>
    <script src="modules/auxs_sends.js"></script>
    <script src="modules/events.js"></script>
    <script src="modules/socket.js"></script>
    <script src="modules/sidebar.js"></script>
    <script src="modules/scroll.js"></script>
    <script src="app.js"></script>
</body>
</html>
